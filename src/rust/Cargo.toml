[package]
name = 'openalexPro'
publish = false
version = '0.1.0'
edition = '2021'
rust-version = '1.65'

[lib]
crate-type = [ 'rlib', 'staticlib' ]
name = 'openalexPro'

[[bin]]
name = 'document'
path = 'document.rs'

[dependencies]
extendr-api = '0.9.0'
openalex-core = { path = "../../../openalex-snapshot/openalex-core" }

[profile.release]
lto = true
codegen-units = 1
